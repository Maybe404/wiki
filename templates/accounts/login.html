{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block extra_head %}
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--color-surface-soft);
    border-radius: var(--rounded-md);
    padding: 48px 44px 44px;
    width: 100%;
    max-width: 400px;
  }

  .login-title {
    font-family: var(--font-serif);
    font-size: var(--text-display-md);
    color: var(--color-ink);
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 0;
  }

  .login-subtitle {
    font-size: var(--text-body-sm);
    color: var(--color-ink-subtle);
    text-align: center;
    margin-bottom: 36px;
  }

  .field { margin-bottom: 20px; }

  .field label {
    display: block;
    font-size: var(--text-body-sm);
    color: var(--color-ink-muted);
    margin-bottom: 6px;
    font-weight: 400;
  }

  .field input {
    display: block;
    width: 100%;
    background: var(--color-canvas);
    border: 1px solid var(--color-hairline);
    border-radius: var(--rounded-md);
    padding: 10px 14px;
    height: 40px;
    font-family: var(--font-sans);
    font-size: var(--text-body);
    font-weight: 400;
    color: var(--color-ink);
    outline: none;
    transition: border-color 150ms, box-shadow 150ms;
  }

  .field input:hover { border-color: var(--color-hairline-strong); }

  .field input:focus {
    border-color: var(--color-primary);
    box-shadow: var(--shadow-focus);
  }

  .error-banner {
    background: var(--color-danger-surface);
    border-radius: var(--rounded-md);
    padding: 10px 14px;
    font-size: var(--text-body-sm);
    color: var(--color-danger);
    margin-bottom: 20px;
  }

  .btn-primary {
    display: block;
    width: 100%;
    background: var(--color-primary);
    color: var(--color-on-primary);
    border: none;
    border-radius: var(--rounded-md);
    padding: 10px 18px;
    height: 40px;
    font-family: var(--font-sans);
    font-size: var(--text-button);
    font-weight: 500;
    cursor: pointer;
    transition: background 150ms, transform 120ms;
    margin-top: 28px;
  }

  .btn-primary:hover  { background: var(--color-primary-hover); }
  .btn-primary:active { background: var(--color-primary-pressed); transform: scale(0.97); }

  .btn-primary:focus-visible {
    outline: none;
    box-shadow: var(--shadow-focus);
  }
</style>
{% endblock %}

{% block body %}
<div class="login-wrap">
  <div class="login-card">
    <h1 class="login-title">文档系统</h1>
    <p class="login-subtitle">内部管理入口</p>

    {% if error %}
    <div class="error-banner" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" novalidate>
      {% csrf_token %}

      <div class="field">
        <label for="id_username">{{ form.username.label }}</label>
        <input
          type="text"
          id="id_username"
          name="username"
          value="{{ form.username.value|default:'' }}"
          autocomplete="username"
          autofocus
          aria-label="{{ form.username.label }}"
        >
      </div>

      <div class="field">
        <label for="id_password">{{ form.password.label }}</label>
        <input
          type="password"
          id="id_password"
          name="password"
          autocomplete="current-password"
          aria-label="{{ form.password.label }}"
        >
      </div>

      <button type="submit" class="btn-primary">登录</button>
    </form>
  </div>
</div>
{% endblock %}
