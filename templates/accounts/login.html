{% extends "base.html" %}

{% block title %}登录{% endblock %}

{% block extra_head %}
<style>
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .login-card {
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 10px;
    padding: 48px 44px 44px;
    width: 100%;
    max-width: 400px;
  }

  .login-title {
    font-family: var(--font-serif);
    font-size: var(--text-h2);
    color: var(--color-text);
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .login-subtitle {
    font-size: var(--text-aux);
    color: var(--color-text-aux);
    text-align: center;
    margin-bottom: 36px;
  }

  .field {
    margin-bottom: 20px;
  }

  .field label {
    display: block;
    font-size: var(--text-aux);
    color: var(--color-text-sub);
    margin-bottom: 6px;
    font-weight: 400;
  }

  .field input {
    display: block;
    width: 100%;
    background: var(--color-surface);
    border: 1px solid var(--color-border);
    border-radius: 6px;
    padding: 10px 14px;
    font-family: var(--font-sans);
    font-size: var(--text-body);
    font-weight: 300;
    color: var(--color-text);
    outline: none;
    transition: border-color 150ms, box-shadow 150ms;
  }

  .field input:focus {
    border-color: var(--color-gold);
    box-shadow: 0 0 0 3px var(--color-focus-ring);
  }

  .error-banner {
    background: var(--color-error-bg);
    border: 1px solid #EECACA;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: var(--text-aux);
    color: var(--color-error-text);
    margin-bottom: 20px;
  }

  .btn-primary {
    display: block;
    width: 100%;
    background: var(--color-accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 11px 18px;
    font-family: var(--font-sans);
    font-size: var(--text-body);
    font-weight: 400;
    cursor: pointer;
    transition: background 150ms;
    margin-top: 28px;
  }

  .btn-primary:hover {
    background: #1F3A2D;
  }

  .btn-primary:focus {
    outline: none;
    box-shadow: 0 0 0 3px var(--color-focus-ring);
  }
</style>
{% endblock %}

{% block body %}
<div class="login-wrap">
  <div class="login-card">
    <h1 class="login-title">文档系统</h1>
    <p class="login-subtitle">内部管理入口</p>

    {% if error %}
    <div class="error-banner" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}" novalidate>
      {% csrf_token %}

      <div class="field">
        <label for="id_username">{{ form.username.label }}</label>
        <input
          type="text"
          id="id_username"
          name="username"
          value="{{ form.username.value|default:'' }}"
          autocomplete="username"
          autofocus
          aria-label="{{ form.username.label }}"
        >
      </div>

      <div class="field">
        <label for="id_password">{{ form.password.label }}</label>
        <input
          type="password"
          id="id_password"
          name="password"
          autocomplete="current-password"
          aria-label="{{ form.password.label }}"
        >
      </div>

      <button type="submit" class="btn-primary">登录</button>
    </form>
  </div>
</div>
{% endblock %}
