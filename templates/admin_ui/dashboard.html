{% extends "base.html" %}

{% block title %}管理后台{% endblock %}

{% block extra_head %}
<style>
  .admin-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .admin-placeholder {
    text-align: center;
    padding: 48px;
  }

  .admin-placeholder h1 {
    font-family: var(--font-serif);
    font-size: var(--text-h2);
    color: var(--color-text);
    margin-bottom: 12px;
  }

  .admin-placeholder p {
    font-size: var(--text-aux);
    color: var(--color-text-sub);
    margin-bottom: 32px;
  }

  .meta {
    font-size: var(--text-aux);
    color: var(--color-text-aux);
    margin-bottom: 32px;
  }

  .logout-link {
    display: inline-block;
    font-size: var(--text-aux);
    color: var(--color-gold);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 150ms, color 150ms;
  }

  .logout-link:hover {
    color: #7A612E;
    border-bottom-color: #7A612E;
  }
</style>
{% endblock %}

{% block body %}
<div class="admin-wrap">
  <div class="admin-placeholder">
    <h1>管理后台</h1>
    <p>阶段 2 占位页 · 后续阶段将实现完整管理界面</p>
    <p class="meta">当前用户：{{ request.user.username }}</p>
    <a href="{% url 'logout' %}" class="logout-link">退出登录</a>
  </div>
</div>
{% endblock %}
