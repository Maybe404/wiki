{% extends "base_public.html" %}
{% load static %}

{% block title %}{{ document.title }} — Docsite{% endblock %}

{% block body %}
<div class="doc-shell">

  <div class="doc-content">
    <header class="doc-header">
      <h1>{{ document.title }}</h1>
    </header>

    <div class="doc-body">
      {{ content_html|safe }}
    </div>

    <div class="doc-footer">
      最后更新于 {{ document.updated_at|date:"Y-m-d" }}
    </div>
  </div>

  <aside class="doc-toc" aria-label="页内目录">
    <p class="doc-toc-title">目录</p>
    <p class="doc-toc-placeholder">目录生成将在后续阶段实现</p>
  </aside>

</div>

<script>
  (function () {
    document.querySelectorAll('.doc-body .doc-section').forEach((el) => {
      el.classList.add('fade-up');
    });

    const targets = document.querySelectorAll('.fade-up');
    if (!targets.length) return;

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      },
      { threshold: 0.08, rootMargin: '0px 0px -32px 0px' }
    );

    targets.forEach((el) => observer.observe(el));
  })();
</script>
{% endblock %}
