{% load static %}<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Docsite{% endblock %}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&family=Noto+Sans+SC:wght@400&family=Noto+Serif+SC:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/public.css' %}">

  {% block extra_head %}{% endblock %}
</head>
<body>

  <header class="pub-topnav" aria-label="主导航">
    <div class="pub-topnav-inner">
      <a href="/" class="pub-brand">
        <span class="pub-brand-mark" aria-hidden="true"></span>
        <span>Docsite</span>
      </a>
      <div class="pub-topnav-spacer"></div>
      <nav class="pub-nav-actions" aria-label="页面操作">
        {% block nav_actions %}{% endblock %}
      </nav>
    </div>
  </header>

  {% block body %}{% endblock %}

  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
