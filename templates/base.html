<!DOCTYPE html>
<html lang="zh-Hans">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Atlas{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&family=Noto+Sans+SC:wght@400&family=Noto+Serif+SC:wght@400&display=swap" rel="stylesheet">

  <style>
    /* Design tokens */
    :root {
      --color-primary:           #cc785c;
      --color-primary-hover:     #b86950;
      --color-primary-pressed:   #a9583e;
      --color-primary-disabled:  #e6dfd8;
      --color-on-primary:        #ffffff;

      --color-canvas:            #faf9f5;
      --color-surface-soft:      #f5f0e8;
      --color-surface-card:      #efe9de;
      --color-surface-overlay:   rgba(20, 20, 19, 0.38);
      --color-surface-dark:      #181715;

      --color-hairline:          #e6dfd8;
      --color-hairline-soft:     #ebe6df;
      --color-hairline-strong:   #d8cec2;

      --color-ink:               #141413;
      --color-ink-body:          #3d3d3a;
      --color-ink-muted:         #6c6a64;
      --color-ink-subtle:        #8e8b82;
      --color-ink-on-dark:       #faf9f5;

      --color-success:           #4f9b65;
      --color-success-surface:   #edf5ee;
      --color-warning:           #b9832f;
      --color-warning-surface:   #fbf1df;
      --color-danger:            #c64545;
      --color-danger-surface:    #fbebea;

      --color-focus-ring:        rgba(204, 120, 92, 0.28);
      --color-link-hover-fill:   rgba(204, 120, 92, 0.08);
      --color-selection:         rgba(204, 120, 92, 0.18);

      --font-serif: 'Cormorant Garamond', 'Noto Serif SC', Georgia, serif;
      --font-sans:  'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:  'JetBrains Mono', 'SF Mono', Consolas, ui-monospace, monospace;

      --text-display-xl:   56px;
      --text-display-lg:   44px;
      --text-display-md:   32px;
      --text-display-sm:   24px;
      --text-title-lg:     22px;
      --text-title-md:     18px;
      --text-body-reading: 17px;
      --text-body:         16px;
      --text-body-sm:      14px;
      --text-meta:         13px;
      --text-label:        12px;
      --text-button:       14px;
      --text-mono:         13px;

      --content-max-width:  760px;
      --content-padding-x:  48px;
      --section-padding-y:  96px;
      --top-nav-height:     64px;
      --sidebar-width:      264px;
      --toc-width:          220px;

      --shadow-focus:    0 0 0 3px var(--color-focus-ring);
      --shadow-floating: 0 16px 48px rgba(20, 20, 19, 0.10);
      --shadow-popover:  0 12px 32px rgba(20, 20, 19, 0.12);

      --rounded-xs:   4px;
      --rounded-sm:   6px;
      --rounded-md:   8px;
      --rounded-xl:   12px;
      --rounded-pill: 9999px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-canvas);
      color: var(--color-ink-body);
      font-family: var(--font-sans);
      font-weight: 400;
      line-height: 1.68;
      font-size: var(--text-body);
    }

    ::selection { background: var(--color-selection); }

    h1, h2, h3 { font-family: var(--font-serif); font-weight: 400; letter-spacing: 0; color: var(--color-ink); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
